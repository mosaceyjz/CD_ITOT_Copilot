<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CD ITOT Co-pilot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <img src="https://ts4.tc.mm.bing.net/th/id/OIP-C.rgjx7DEAlBjZhlfhm3M8MAHaF7?rs=1&pid=ImgDetMain&o=7&rm=3"alt="Logo" class="logo">
            <h1>CD ITOT Co-pilot</h1>
        </div>
        <div class="chat-box" id="chat-box">
            <!-- Chat messages will be appended here -->
        </div>
        <div class="chat-input">
            <input type="text" id="user-input" placeholder="Type your question here...">
            <input type="file" id="file-input" style="display: none;" accept="image/png, image/jpeg, image/jpg, image/webp, image/gif">
            <button id="upload-btn">Upload</button>
            <button id="send-btn">Send</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
